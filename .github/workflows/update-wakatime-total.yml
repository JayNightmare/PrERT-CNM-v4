name: Update Total Time in README

on:
    workflow_dispatch:
    schedule:
        - cron: "17 3 * * *"

permissions:
    contents: write

jobs:
    update-readme-total:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Update README WakaTime total
              run: python scripts/update_wakatime_totals.py --write

            - name: Commit changes
              run: |
                  if git diff --quiet -- README.md; then
                    echo "No README changes to commit"
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add README.md
                  git commit -m "chore: update WakaTime total"
                  git push
